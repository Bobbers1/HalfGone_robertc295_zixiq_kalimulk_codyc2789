<!DOCTYPE html>
<html>
<head>
    <title>{{ ticker }} - FAANG+ Stock Explorer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-50">
    <nav class="bg-blue-600 text-white p-4 flex justify-between">
        <h1 class="text-xl font-bold">FAANG+ Explorer</h1>
        <div>
            <a href="/dashboard" class="mr-4">Dashboard</a>
            <a href="/logout" class="text-red-200">Logout</a>
        </div>
    </nav>

    <div class="container mx-auto p-8">
        <div class="bg-white p-6 rounded shadow mb-8">
            <h2 class="text-3xl font-bold">{{ ticker }}</h2>
            <div class="mt-4 grid grid-cols-4 gap-4">
                <div class="bg-gray-50 p-4 rounded">
                    <p class="text-gray-500 text-sm">Latest Close</p>
                    <p class="text-xl font-bold">${{ latest_close }}</p>
                </div>
                <div class="bg-gray-50 p-4 rounded">
                    <p class="text-gray-500 text-sm">5Y High</p>
                    <p class="text-xl font-bold">${{ high }}</p>
                </div>
                <div class="bg-gray-50 p-4 rounded">
                    <p class="text-gray-500 text-sm">5Y Low</p>
                    <p class="text-xl font-bold">${{ low }}</p>
                </div>
                <div class="bg-gray-50 p-4 rounded">
                    <p class="text-gray-500 text-sm">Avg Volume</p>
                    <p class="text-xl font-bold">{{ avg_volume }}</p>
                </div>
            </div>
        </div>

        <div class="bg-white p-4 rounded shadow">
            <h3 class="text-lg font-semibold mb-4">Price History</h3>
            <canvas id="stockChart"></canvas>
        </div>
    </div>

    <script>
        const labels = {{ dates | tojson }};
        const prices = {{ closes | tojson }};

        const ctx = document.getElementById('stockChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Close Price',
                    data: prices,
                    borderColor: 'rgb(59, 130, 246)',
                    tension: 0.1,
                    pointRadius: 0
                }]
            },
            options: {
                scales: {
                    x: { ticks: { maxTicksLimit: 12 } },
                    y: { ticks: { callback: v => '$' + v } }
                }
            }
        });
    </script>
</body>
</html>
