<!DOCTYPE html>
<html>
<head>
    <title>Stock Profile - FAANG+ Stock Explorer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-50">
    <nav class="bg-blue-600 text-white p-4 flex justify-between">
        <h1 class="text-xl font-bold">FAANG+ Explorer</h1>
        <div>
            <a href="/dashboard" class="mr-4">Dashboard</a>
            <a href="/logout" class="text-red-200">Logout</a>
        </div>
    </nav>

    <div class="container mx-auto p-8">
        <div class="bg-white p-6 rounded shadow mb-8">
            <h2 class="text-3xl font-bold">AAPL</h2>
            <p class="text-gray-600">Apple Inc.</p>
            <div class="mt-4 flex gap-4">
                <span class="bg-green-100 text-green-800 px-3 py-1 rounded">Tech</span>
                <span class="bg-blue-100 text-blue-800 px-3 py-1 rounded">FAANG+</span>
            </div>
        </div>

        <div class="bg-white p-4 rounded shadow">
            <h3 class="text-lg font-semibold mb-4">Price History</h3>
            <canvas id="stockChart"></canvas>
        </div>
    </div>

    <script>
        const ctx = document.getElementById('stockChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri'],
                datasets: [{
                    label: 'Close Price',
                    data: [150, 152, 151, 155, 158],
                    borderColor: 'rgb(59, 130, 246)',
                    tension: 0.1
                }]
            }
        });
    </script>
</body>
</html>
