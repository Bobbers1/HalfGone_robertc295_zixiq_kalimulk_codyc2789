<!DOCTYPE html>
<html>
<head>
    <title>Explore - FAANG+ Stock Explorer</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <nav class="bg-blue-600 text-white p-4 flex justify-between">
        <h1 class="text-xl font-bold">FAANG+ Explorer</h1>
        <div>
            <a href="/dashboard" class="mr-4">Dashboard</a>
            <a href="/logout" class="text-red-200">Logout</a>
        </div>
    </nav>

    <div class="container mx-auto p-8">
        <h2 class="text-2xl font-bold mb-6">Explore Stocks</h2>
        <div class="bg-white p-6 rounded shadow">
            <label class="block text-gray-600 mb-2">Select a stock</label>
            <select id="tickerSelect" class="border p-2 rounded w-64">
                <option value="AAPL">AAPL - Apple Inc.</option>
                <option value="MSFT">MSFT - Microsoft</option>
                <option value="AMZN">AMZN - Amazon</option>
                <option value="GOOGL">GOOGL - Alphabet</option>
                <option value="META">META - Meta</option>
                <option value="NVDA">NVDA - NVIDIA</option>
            </select>
            <button onclick="window.location.href='/stock?ticker=' + document.getElementById('tickerSelect').value"
                class="ml-4 bg-blue-600 text-white px-4 py-2 rounded">
                View Stock
            </button>

            <div class="flex-1">
                <p class="text-sm text-gray-500 mb-2">Or type a ticker</p>

                <input
                    id="tickerInput"
                    type="text"
                    placeholder="e.g. TSLA"
                    class="border p-2 rounded w-full"
                >

                <button
                    onclick="goToStock()"
                    class="mt-3 bg-green-600 text-white px-4 py-2 rounded w-full"
                >
                View Typed Stock
                </button>
            </div>
        </div>
    </div>

    <script>
        function goToStock() {
        const ticker = document.getElementById('tickerInput').value.trim();

        if (!ticker) return;

        window.location.href = '/stock?ticker=' + ticker;
    }
    </script>
</body>
</html>
