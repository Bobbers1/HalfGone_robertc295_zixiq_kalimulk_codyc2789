<!DOCTYPE html>
<html>
<head>
    <title>Explore - FAANG+ Stock Explorer</title>
    <link href="{{ url_for('static', filename='tailwind.min.css') }}" rel="stylesheet">
</head>
<body class="bg-gray-50">
    <nav class="bg-blue-600 text-white p-4 flex justify-between">
        <h1 class="text-xl font-bold">FAANG+ Explorer</h1>
        <div>
            <a href="/dashboard" class="mr-4">Dashboard</a>
            <a href="/logout" class="text-red-200">Logout</a>
        </div>
    </nav>

    <div class="container mx-auto p-8">
        <h2 class="text-2xl font-bold mb-6">Explore Stocks</h2>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    {% if category == 'danger' %}
                        <div class="mb-4 p-3 rounded bg-red-100 text-red-700 border border-red-300">
                            {{ message }}
                        </div>
                    {% endif %}
                {% endfor %}
            {% endif %}
        {% endwith %}
        <div class="bg-white p-6 rounded shadow">
            <label class="block text-gray-600 mb-2">Select a stock</label>
            <select id="tickerSelect" class="border p-2 rounded w-64">
                <option value="AAPL">AAPL - Apple Inc.</option>
                <option value="MSFT">MSFT - Microsoft</option>
                <option value="AMZN">AMZN - Amazon</option>
                <option value="GOOGL">GOOGL - Alphabet</option>
                <option value="META">META - Meta</option>
                <option value="NVDA">NVDA - NVIDIA</option>
            </select>
            <button onclick="window.location.href='/stock?ticker=' + document.getElementById('tickerSelect').value"
                class="ml-4 bg-blue-600 text-white px-4 py-2 rounded">
                View Stock
            </button>

            <div class="flex-1 mt-3">
                <label class="block text-gray-600 mb-2 rounded">Or type a ticker</p>

                <input
                    id="tickerInput"
                    type="text"
                    placeholder="e.g. TSLA"
                    class="mt-3 border p-2 rounded w-full"
                >

                <button
                    onclick="goToStock()"
                    class="mt-3 bg-green-600 text-white px-4 py-2 rounded w-full"
                >
                View Typed Stock
                </button>
            </div>
        </div>

        <div class="bg-white p-6 rounded shadow mt-6">
        <h3 class="text-lg font-semibold mb-4">Compare Two Stocks</h3>
        
        <div class="flex gap-4 items-end flex-wrap">
            <div>
                <label class="block text-gray-600 mb-2">Tickers</label>
                <div class="flex gap-3">
                    <input id="compareInput1" type="text" placeholder="e.g. TSLA" class="border p-2 rounded w-28">
                    <input id="compareInput2" type="text" placeholder="e.g. MSFT" class="border p-2 rounded w-28">
                </div>
            </div>

            <button onclick="goToCompare()" class="ml-2 bg-blue-600 text-white px-4 py-2 rounded">
                Compare
            </button>
        </div>
    </div>

    <script>
        function goToStock() {
        const ticker = document.getElementById('tickerInput').value.trim();

        if (!ticker) return;

        window.location.href = '/stock?ticker=' + ticker;
        }

        function goToCompare() {
            const t1 = document.getElementById('compareInput1').value.trim() || document.getElementById('compareSelect1').value;
            const t2 = document.getElementById('compareInput2').value.trim() || document.getElementById('compareSelect2').value;

            if (!t1 || !t2) return;
            if (t1.toUpperCase() === t2.toUpperCase()) {
                alert("Please select two different stocks.");
                return;
            }

            window.location.href = '/stock?ticker=' + t1 + '&compare=' + t2;
        }
    </script>
</body>
</html>
