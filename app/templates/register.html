<!DOCTYPE html>
<html>
<head>
    <title>Register - FAANG+ Stock Explorer</title>
    <link href="{{ url_for('static', filename='tailwind.min.css') }}" rel="stylesheet">
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">
    <div class="bg-white p-8 rounded shadow-md w-96">
        <h1 class="text-2xl font-bold mb-6 text-center">Register</h1>
        <form method="POST">
            <div class="mb-4">
                <label class="block text-gray-700">Username</label>
                <input type="text" name="username" class="w-full border p-2 rounded" required>
            </div>
            <div class="mb-6">
                <label class="block text-gray-700">Password</label>
                <input type="password" name="password" class="w-full border p-2 rounded" required>
            </div>
            <button type="submit" class="w-full bg-green-500 text-white p-2 rounded hover:bg-green-600">Register</button>
        </form>
        <p class="mt-4 text-center">
            <a href="/login" class="text-blue-500">Login</a>
        </p>
    </div>
</body>
</html>
