<!DOCTYPE html>
<html>
<head>
    <title>Dashboard - FAANG+ Stock Explorer</title>
    <link href="{{ url_for('static', filename='tailwind.min.css') }}" rel="stylesheet">
    <script src="{{ url_for('static', filename='chart.umd.min.js') }}"></script>
</head>
<body class="bg-gray-50">
    <nav class="bg-blue-600 text-white p-4 flex justify-between">
        <h1 class="text-xl font-bold">FAANG+ Explorer</h1>
        <div>
            <a href="/dashboard" class="mr-4">Dashboard</a>
            <a href="/analysis" class="mr-4">Analysis</a>
            <a href="/explore" class="mr-4">Explore</a>
            <a href="/supply-chain" class="mr-4">Supply Chain</a>
            <a href="/logout" class="text-red-200">Logout</a>
        </div>
    </nav>

    <div class="container mx-auto p-8">
        <h2 class="text-2xl font-bold mb-6">Market Overview</h2>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <!-- Growth Chart -->
            <div class="bg-white p-4 border">
                <h3 class="text-lg font-semibold mb-4">Indexed Growth</h3>
                <canvas id="growthChart"></canvas>
            </div>

            <!-- Risk vs Return -->
            <div class="bg-white p-4 border">
                <h3 class="text-lg font-semibold mb-4">Risk vs Return</h3>
                <canvas id="riskChart"></canvas>
            </div>
        </div>
        
        <div class="mt-8 bg-white p-4 border">
            <h3 class="text-lg font-semibold mb-4">Quick Stats</h3>
            <div class="grid grid-cols-3 gap-4 text-center">
                <div>
                    <p id="marketReturnStat" class="text-2xl font-bold text-green-600">Loading...</p>
                    <p class="text-sm text-gray-600">Average Latest Daily Return</p>
                </div>
                <div>
                    <p id="stocksTrackedStat" class="text-2xl font-bold text-blue-600">Loading...</p>
                    <p class="text-sm text-gray-600">Stocks Tracked</p>
                </div>
                <div>
                    <p id="avgVolumeStat" class="text-2xl font-bold text-purple-600">Loading...</p>
                    <p class="text-sm text-gray-600">Latest Avg Volume</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const growthColors = ['rgb(169, 169, 169)', 'rgb(118, 185, 0)', 'rgb(0, 120, 212)', 'rgb(66, 133, 244)'];
        const ctxGrowth = document.getElementById('growthChart').getContext('2d');
        const growthChart = new Chart(ctxGrowth, {
            type: 'line',
            data: {
                labels: [],
                datasets: []
            },
            options: { responsive: true }
        });

        const ctxRisk = document.getElementById('riskChart').getContext('2d');
        const riskChart = new Chart(ctxRisk, {
            type: 'scatter',
            data: {
                datasets: [{
                    label: 'Stocks',
                    data: [],
                    backgroundColor: []
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    tooltip: {
                        callbacks: {
                            label: ctx => {
                                const point = ctx.raw;
                                return `${point.t}: ${point.y}% return, ${point.x}% volatility`;
                            }
                        }
                    }
                },
                scales: {
                    x: { title: { display: true, text: 'Annualized Volatility (%)' } },
                    y: { title: { display: true, text: 'Annualized Return (%)' } }
                }
            }
        });

        function setErrorState(message) {
            document.getElementById('marketReturnStat').textContent = message;
            document.getElementById('stocksTrackedStat').textContent = '--';
            document.getElementById('avgVolumeStat').textContent = '--';
        }

        fetch('{{ url_for("get_dashboard_data") }}')
            .then(response => {
                if (!response.ok) {
                    throw new Error(`Request failed with status ${response.status}`);
                }
                return response.json();
            })
            .then(data => {
                document.getElementById('marketReturnStat').textContent = data.stats.market_return;
                document.getElementById('stocksTrackedStat').textContent = data.stats.stocks_tracked;
                document.getElementById('avgVolumeStat').textContent = data.stats.avg_volume;

                growthChart.data.labels = data.growth_labels;
                growthChart.data.datasets = data.growth_series.map((series, index) => ({
                    label: series.label,
                    data: series.data,
                    borderColor: growthColors[index % growthColors.length],
                    tension: 0.1
                }));
                growthChart.update();

                riskChart.data.datasets[0].data = data.risk_points;
                riskChart.data.datasets[0].backgroundColor = data.risk_points.map((_, index) => growthColors[index % growthColors.length]);
                riskChart.update();
            })
            .catch(error => {
                console.error('Failed to load dashboard data:', error);
                setErrorState('Unavailable');
            });
    </script>
</body>
</html>
