<!DOCTYPE html>
<html>
<head>
    <title>Dashboard - FAANG+ Stock Explorer</title>
    <!-- <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script> -->
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body class="bg-gray-50">
    <nav class="bg-blue-600 text-white p-4 flex justify-between">
        <h1 class="text-xl font-bold">FAANG+ Explorer</h1>
        <div>
            <a href="/dashboard" class="mr-4">Dashboard</a>
            <a href="/explore" class="mr-4">Explore</a>
            <a href="/logout" class="text-red-200">Logout</a>
        </div>
    </nav>

    <div class="container mx-auto p-8">
        <h2 class="text-2xl font-bold mb-6">Market Overview</h2>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <!-- Growth Chart -->
            <div class="bg-white p-4 rounded shadow">
                <h3 class="text-lg font-semibold mb-4">Indexed Growth</h3>
                <canvas id="growthChart"></canvas>
            </div>

            <!-- Risk vs Return -->
            <div class="bg-white p-4 rounded shadow">
                <h3 class="text-lg font-semibold mb-4">Risk vs Return</h3>
                <canvas id="riskChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        // Basic Chart.js Implementation
        const ctxGrowth = document.getElementById('growthChart').getContext('2d');
        new Chart(ctxGrowth, {
            type: 'line',
            data: {
                labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May'],
                datasets: [{
                    label: 'AAPL',
                    data: [100, 105, 103, 110, 115],
                    borderColor: 'rgb(75, 192, 192)',
                    tension: 0.1
                }]
            }
        });

        const ctxRisk = document.getElementById('riskChart').getContext('2d');
        new Chart(ctxRisk, {
            type: 'scatter',
            data: {
                datasets: [{
                    label: 'Stocks',
                    data: [{x: 10, y: 20}, {x: 15, y: 25}],
                    backgroundColor: 'rgb(255, 99, 132)'
                }]
            }
        });
    </script>
</body>
</html>
